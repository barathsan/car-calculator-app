<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Affordability Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚗 Car Affordability Calculator</h1>

    <label>Monthly Salary (₹)</label>
    <input type="number" id="salary">

    <label>Loan Interest Rate (%)</label>
    <input type="number" id="rate" value="9">

    <label>Loan Tenure (Years)</label>
    <input type="number" id="years" value="5">

    <label>Affordability Multiplier (15–25)</label>
    <input type="range" id="multiplier" min="15" max="25" value="18">
    <p>Multiplier: <span id="multiValue">18</span></p>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
