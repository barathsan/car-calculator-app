<!DOCTYPE html>
<html>
<head>
    <title>Car Finance Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚗 Car Finance Pro Calculator</h1>

    <h3>💰 Income Details</h3>
    <input id="salary" placeholder="Monthly Salary">
    <input id="otherIncome" placeholder="Other Income">
    <input id="existingEmi" placeholder="Existing EMIs">
    <input id="savings" placeholder="Monthly Savings">

    <h3>🚗 Car Details</h3>
    <input id="carPrice" placeholder="Car Price">
    <input id="downPayment" placeholder="Down Payment % (e.g. 20)">
    <input id="insurance" placeholder="Insurance % (e.g. 5)">
    <input id="tax" placeholder="Road Tax % (e.g. 10)">

    <h3>🏦 Loan Details</h3>
    <input id="rate" placeholder="Interest Rate %">
    <input id="years" placeholder="Loan Tenure (Years)">
    <input id="processingFee" placeholder="Processing Fee %">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
